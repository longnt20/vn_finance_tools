<!DOCTYPE html>
<html lang="vi" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Công cụ tài chính cá nhân Việt Nam - Tính lương Gross/Net, thuế TNCN, vay mua nhà mua xe" />
  <title>VN Finance Tools - Công cụ tài chính cá nhân</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --font-sans: 'Be Vietnam Pro', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    * { box-sizing: border-box; }
    body { font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    .font-mono { font-family: var(--font-mono) !important; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }

    /* Transitions */
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s, transform 0.2s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(6px); }
    .toast-enter-active, .toast-leave-active { transition: opacity 0.2s, transform 0.2s; }
    .toast-enter-from, .toast-leave-to { opacity: 0; transform: translateY(10px); }
    .slide-enter-active, .slide-leave-active { transition: opacity 0.2s; }
    .slide-enter-from, .slide-leave-to { opacity: 0; }

    /* Input styling */
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* Chart canvas */
    canvas { max-height: 220px; }

    /* Number animation */
    @keyframes numChange { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .num-animate { animation: numChange 0.25s ease-out; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeInUp 0.35s ease-out both; }

    /* Pulse */
    @keyframes pulseSlow { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse-slow { animation: pulseSlow 2.5s ease-in-out infinite; }
  </style>

      darkMode: 'class',
      theme: {

          },

              50:'#f0fdf9', 100:'#ccfbef', 200:'#99f6df', 300:'#5eead4',
              400:'#2dd4bf', 500:'#14b8a6', 600:'#0d9488', 700:'#0f766e',

</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">

<div id="app"></div>

<script>
const { createApp, ref, computed, watch, onMounted, nextTick, Transition } = Vue

// ========== UTILS ==========
const INSURANCE_RATES = { BHXH: 0.08, BHYT: 0.015, BHTN: 0.01 }
const PERSONAL_DEDUCTION = 15.5
const DEPENDENT_DEDUCTION = 6.2
const TAX_BRACKETS = [
  { min:0, max:10, rate:0.05, label:'Bậc 1' },
  { min:10, max:30, rate:0.10, label:'Bậc 2' },
  { min:30, max:60, rate:0.20, label:'Bậc 3' },
  { min:60, max:100, rate:0.30, label:'Bậc 4' },
  { min:100, max:Infinity, rate:0.35, label:'Bậc 5' },
]

function calcProgressiveTax(taxableIncome) {
  if (taxableIncome <= 0) return { total: 0, brackets: [] }
  let remaining = taxableIncome, total = 0
  const brackets = TAX_BRACKETS.map(b => {
    if (remaining <= 0) return { ...b, taxableAmount: 0, taxAmount: 0, active: false }
    const width = b.max === Infinity ? remaining : Math.min(b.max - b.min, remaining)
    const taxable = Math.min(width, remaining)
    const tax = taxable * b.rate
    total += tax
    remaining -= taxable
    return { ...b, taxableAmount: taxable, taxAmount: tax, active: taxable > 0 }
  })
  return { total, brackets }
}

function calcNetFromGross(gross, dependents = 0, hasIns = true) {
  const bhxh = hasIns ? gross * 0.08 : 0
  const bhyt = hasIns ? gross * 0.015 : 0
  const bhtn = hasIns ? gross * 0.01 : 0
  const totalIns = bhxh + bhyt + bhtn
  const taxableIncome = Math.max(0, gross - totalIns - PERSONAL_DEDUCTION - dependents * DEPENDENT_DEDUCTION)
  const taxResult = calcProgressiveTax(taxableIncome)
  return { gross, bhxh, bhyt, bhtn, totalInsurance: totalIns, taxableIncome, tax: taxResult.total, net: gross - totalIns - taxResult.total, dependentDeductionTotal: dependents * DEPENDENT_DEDUCTION, taxBrackets: taxResult.brackets }
}

function calcGrossFromNet(net, dependents = 0, hasIns = true) {
  if (net <= 0) return calcNetFromGross(0, dependents, hasIns)
  let lo = net, hi = net * 2.5, gross = net
  for (let i = 0; i < 100; i++) {
    gross = (lo + hi) / 2
    const r = calcNetFromGross(gross, dependents, hasIns)
    const diff = r.net - net
    if (Math.abs(diff) < 0.0001) break
    if (diff > 0) hi = gross; else lo = gross
  }
  return calcNetFromGross(gross, dependents, hasIns)
}

function calcLoanDecreasing(P, annualRate, months) {
  const r = annualRate / 100 / 12
  const monthlyP = P / months
  let balance = P, totalInterest = 0
  const schedule = []
  for (let m = 1; m <= months; m++) {
    const interest = balance * r
    const payment = monthlyP + interest
    totalInterest += interest
    balance -= monthlyP
    schedule.push({ month: m, payment: Math.max(0, payment), principal: monthlyP, interest, balance: Math.max(0, balance) })
  }
  return { type: 'decreasing', monthlyPaymentFirst: schedule[0]?.payment || 0, monthlyPaymentLast: schedule[schedule.length-1]?.payment || 0, totalInterest, totalPayment: P + totalInterest, principal: P, schedule }
}

function calcLoanAnnuity(P, annualRate, months) {
  const r = annualRate / 100 / 12
  const mp = r === 0 ? P / months : (P * r * Math.pow(1+r,months)) / (Math.pow(1+r,months) - 1)
  let balance = P, totalInterest = 0
  const schedule = []
  for (let m = 1; m <= months; m++) {
    const interest = balance * r
    const principalPart = mp - interest
    totalInterest += interest
    balance -= principalPart
    schedule.push({ month: m, payment: mp, principal: principalPart, interest, balance: Math.max(0, balance) })
  }
  return { type: 'annuity', monthlyPayment: mp, totalInterest, totalPayment: mp * months, principal: P, schedule }
}

function calcTax({ income, dependents = 0, hasIns = true, otherIncome = 0, period = 'monthly' }) {
  const totalGross = income + otherIncome
  const bhxh = hasIns ? income * 0.08 : 0
  const bhyt = hasIns ? income * 0.015 : 0
  const bhtn = hasIns ? income * 0.01 : 0
  const totalIns = bhxh + bhyt + bhtn
  const taxableSubject = totalGross - totalIns
  const depDed = dependents * DEPENDENT_DEDUCTION
  const taxCalcIncome = Math.max(0, taxableSubject - PERSONAL_DEDUCTION - depDed)
  const taxResult = calcProgressiveTax(taxCalcIncome)
  return {
    period, totalGrossIncome: totalGross, bhxh, bhyt, bhtn, totalInsurance: totalIns,
    taxableSubjectIncome: taxableSubject, personalDeduction: PERSONAL_DEDUCTION,
    dependentDeductionTotal: depDed, totalDeductions: PERSONAL_DEDUCTION + depDed,
    taxCalculationIncome: taxCalcIncome, tax: taxResult.total,
    netIncome: totalGross - totalIns - taxResult.total,
    taxBrackets: taxResult.brackets,
    effectiveTaxRate: totalGross > 0 ? (taxResult.total / totalGross) * 100 : 0
  }
}

function fmtCur(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2) + 'B'
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M'
  return new Intl.NumberFormat('vi-VN').format(Math.round(v))
}

function getHistory(type) {
  try { return JSON.parse(localStorage.getItem(`vn-finance-${type}`) || '[]') } catch { return [] }
}
function saveHistory(type, data) {
  const h = getHistory(type)
  const entry = { id: Date.now(), timestamp: new Date().toISOString(), ...data }
  localStorage.setItem(`vn-finance-${type}`, JSON.stringify([entry, ...h].slice(0, 50)))
}
function clearHistoryAll() {
  ['salary','loan','tax'].forEach(t => localStorage.removeItem(`vn-finance-${t}`))
}

// ========== APP ==========
const App = {
  setup() {
    // Dark mode
    const isDark = ref(localStorage.getItem('vn-theme') === 'dark')
    watch(isDark, v => {
      document.documentElement.classList.toggle('dark', v)
      localStorage.setItem('vn-theme', v ? 'dark' : 'light')
    }, { immediate: true })
    const toggleDark = () => isDark.value = !isDark.value

    // Navigation
    const page = ref('home')
    const mobileMenuOpen = ref(false)
    const navItems = [
      { key: 'home', icon: '🏠', label: 'Trang chủ' },
      { key: 'salary', icon: '💰', label: 'Tính Lương' },
      { key: 'loan', icon: '🏦', label: 'Tính Vay' },
      { key: 'tax', icon: '📊', label: 'Thuế TNCN' },
      { key: 'history', icon: '📋', label: 'Lịch Sử' },
    ]

    // Toast
    const toastMsg = ref('')
    function showToast(msg) {
      toastMsg.value = msg
      setTimeout(() => toastMsg.value = '', 2500)
    }

    // ---- SALARY ----
    const salaryMode = ref('gross-to-net')
    const salaryInput = ref(20)
    const salaryDeps = ref(0)
    const salaryIns = ref(true)
    const salaryResult = ref(null)
    let salaryChart = null

    const salaryQuickValues = [10, 15, 20, 25, 30, 40, 50, 70, 100]

    function calcSalary() {
      const amt = parseFloat(salaryInput.value)
      if (!amt || amt <= 0) return
      salaryResult.value = salaryMode.value === 'gross-to-net'
        ? calcNetFromGross(amt, salaryDeps.value, salaryIns.value)
        : calcGrossFromNet(amt, salaryDeps.value, salaryIns.value)
      nextTick(() => renderSalaryChart())
    }

    function renderSalaryChart() {
      const canvas = document.getElementById('salaryPieChart')
      if (!canvas || !salaryResult.value) return
      if (salaryChart) salaryChart.destroy()
      const r = salaryResult.value
      salaryChart = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: ['BHXH', 'BHYT', 'BHTN', 'Thuế TNCN', 'Lương Net'],
          datasets: [{
            data: [r.bhxh, r.bhyt, r.bhtn, r.tax, r.net],
            backgroundColor: ['#f97316','#eab308','#ec4899','#ef4444','#14b8a6'],
            borderWidth: 0, hoverOffset: 8,
          }]
        },
        options: {
          cutout: '65%', responsive: true, maintainAspectRatio: true,
          plugins: {
            legend: { position: 'bottom', labels: { font: { size: 10 }, padding: 10, usePointStyle: true } },
            tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed.toFixed(3)}tr` } }
          }
        }
      })
    }

    function saveSalaryHistory() {
      if (!salaryResult.value) return
      const r = salaryResult.value
      saveHistory('salary', {
        mode: salaryMode.value, inputAmount: salaryInput.value,
        dependents: salaryDeps.value, hasInsurance: salaryIns.value,
        gross: r.gross, net: r.net, tax: r.tax,
        label: `Gross: ${r.gross.toFixed(1)}tr → Net: ${r.net.toFixed(1)}tr`
      })
      showToast('✅ Đã lưu vào lịch sử!')
    }

    function isActiveBracket(bracket) {
      return salaryResult.value?.taxBrackets?.some(b => b.label === bracket.label && b.active)
    }

    // ---- LOAN ----
    const loanTotalValue = ref(3000)
    const loanDownPayment = ref(600)
    const loanRate = ref(9)
    const loanYears = ref(20)
    const loanType = ref('annuity')
    const loanResult = ref(null)
    let loanChart = null

    const loanPrincipal = computed(() => Math.max(0, (loanTotalValue.value - loanDownPayment.value)))
    const loanDownPct = computed(() => loanTotalValue.value > 0 ? ((loanDownPayment.value / loanTotalValue.value) * 100).toFixed(0) : 0)
    const loanMonthlyPayment = computed(() => {
      if (!loanResult.value) return 0
      return loanType.value === 'annuity' ? loanResult.value.monthlyPayment : loanResult.value.monthlyPaymentFirst
    })
    const loanPreviewSchedule = computed(() => {
      if (!loanResult.value?.schedule) return []
      const s = loanResult.value.schedule
      if (s.length <= 24) return s
      return [...s.slice(0, 12), { month: '...', payment: null, principal: null, interest: null, balance: null }, ...s.slice(-6)]
    })

    function calcLoan() {
      const P = loanPrincipal.value * 1_000_000
      const months = loanYears.value * 12
      if (P <= 0 || months <= 0) return
      loanResult.value = loanType.value === 'annuity'
        ? calcLoanAnnuity(P, loanRate.value, months)
        : calcLoanDecreasing(P, loanRate.value, months)
      nextTick(() => renderLoanChart())
    }

    function renderLoanChart() {
      const canvas = document.getElementById('loanLineChart')
      if (!canvas || !loanResult.value) return
      if (loanChart) loanChart.destroy()
      const s = loanResult.value.schedule
      const step = Math.max(1, Math.floor(s.length / 50))
      const sampled = s.filter((_, i) => i % step === 0 || i === s.length - 1)
      loanChart = new Chart(canvas, {
        type: 'line',
        data: {
          labels: sampled.map(r => `T${r.month}`),
          datasets: [
            { label: 'Dư nợ', data: sampled.map(r => r.balance/1e6), borderColor: '#14b8a6', backgroundColor: 'rgba(20,184,166,0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 },
            { label: 'Lãi', data: sampled.map(r => r.interest/1e6), borderColor: '#ef4444', fill: false, tension: 0.4, pointRadius: 0, borderWidth: 2 },
            { label: 'Gốc', data: sampled.map(r => r.principal/1e6), borderColor: '#8b5cf6', fill: false, tension: 0.4, pointRadius: 0, borderWidth: 2 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, padding: 10, usePointStyle: true } }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}tr` } } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 8, font: { size: 9 } } },
            y: { grid: { color: 'rgba(148,163,184,0.08)' }, ticks: { callback: v => v.toFixed(0)+'tr', maxTicksLimit: 6, font: { size: 9 } } }
          }
        }
      })
    }

    function saveLoanHistory() {
      if (!loanResult.value) return
      saveHistory('loan', {
        totalValue: loanTotalValue.value, downPayment: loanDownPayment.value,
        annualRate: loanRate.value, termYears: loanYears.value, loanType: loanType.value,
        monthlyPayment: loanMonthlyPayment.value / 1e6,
        totalInterest: loanResult.value.totalInterest / 1e6,
        label: `Vay ${loanPrincipal.value.toFixed(0)}tr | ${loanYears.value}y | ${loanRate.value}%`
      })
      showToast('✅ Đã lưu vào lịch sử!')
    }

    // ---- TAX ----
    const taxPeriod = ref('monthly')
    const taxIncome = ref(25)
    const taxDeps = ref(0)
    const taxIns = ref(true)
    const taxOtherIncome = ref(0)
    const taxResult = ref(null)

    const taxActiveBrackets = computed(() => TAX_BRACKETS.map(b => {
      const found = taxResult.value?.taxBrackets?.find(x => x.label === b.label)
      return { ...b, taxAmount: found?.taxAmount || 0, highlighted: found?.active && found?.taxAmount > 0 }
    }))

    function doCalcTax() {
      const inc = parseFloat(taxIncome.value)
      if (!inc || inc <= 0) return
      const monthlyInc = taxPeriod.value === 'monthly' ? inc : inc / 12
      const monthlyOther = taxPeriod.value === 'monthly' ? (parseFloat(taxOtherIncome.value)||0) : (parseFloat(taxOtherIncome.value)||0) / 12
      const monthly = calcTax({ income: monthlyInc, dependents: taxDeps.value, hasIns: taxIns.value, otherIncome: monthlyOther })
      if (taxPeriod.value === 'annual') {
        taxResult.value = { ...monthly, period: 'annual', totalGrossIncome: monthly.totalGrossIncome*12, bhxh: monthly.bhxh*12, bhyt: monthly.bhyt*12, bhtn: monthly.bhtn*12, totalInsurance: monthly.totalInsurance*12, taxableSubjectIncome: monthly.taxableSubjectIncome*12, personalDeduction: monthly.personalDeduction*12, dependentDeductionTotal: monthly.dependentDeductionTotal*12, totalDeductions: monthly.totalDeductions*12, taxCalculationIncome: monthly.taxCalculationIncome*12, tax: monthly.tax*12, netIncome: monthly.netIncome*12 }
      } else {
        taxResult.value = monthly
      }
    }

    function saveTaxHistory() {
      if (!taxResult.value) return
      saveHistory('tax', {
        period: taxPeriod.value, income: taxIncome.value,
        dependents: taxDeps.value, hasInsurance: taxIns.value, otherIncome: taxOtherIncome.value,
        tax: taxResult.value.tax, effectiveTaxRate: taxResult.value.effectiveTaxRate,
        label: `${taxPeriod.value==='monthly'?'Tháng':'Năm'}: ${taxIncome.value}tr → Thuế: ${taxResult.value.tax.toFixed(2)}tr`
      })
      showToast('✅ Đã lưu!')
    }

    // ---- HISTORY ----
    const histTab = ref('salary')
    const histTabs = [
      { key: 'salary', label: 'Lương', icon: '💰' },
      { key: 'loan', label: 'Vay', icon: '🏦' },
      { key: 'tax', label: 'Thuế', icon: '📊' },
    ]
    const showClearConfirm = ref(false)
    const histories = ref({
      salary: getHistory('salary'),
      loan: getHistory('loan'),
      tax: getHistory('tax'),
    })
    const currentHistory = computed(() => histories.value[histTab.value] || [])
    const hasAnyHistory = computed(() => Object.values(histories.value).some(h => h.length > 0))

    function deleteHistItem(id) {
      const key = `vn-finance-${histTab.value}`
      const h = getHistory(histTab.value).filter(i => i.id !== id)
      localStorage.setItem(key, JSON.stringify(h))
      histories.value[histTab.value] = h
    }

    function confirmClear() {
      clearHistoryAll()
      histories.value = { salary: [], loan: [], tax: [] }
      showClearConfirm.value = false
    }

    function refreshHistory() {
      histories.value = { salary: getHistory('salary'), loan: getHistory('loan'), tax: getHistory('tax') }
    }

    watch(page, (p) => {
      if (p === 'history') refreshHistory()
      mobileMenuOpen.value = false
    })

    function navigate(p) {
      page.value = p
      mobileMenuOpen.value = false
    }

    function fmtBracketRange(b) { return b.max === Infinity ? `> ${b.min}tr` : `${b.min}–${b.max}tr` }
    function fmtDate(ts) { return new Date(ts).toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) }

    // Auto-calculate defaults on mount
    onMounted(() => {
      calcSalary()
    })

    return {
      isDark, toggleDark, page, navItems, navigate, mobileMenuOpen, toastMsg,
      // Salary
      salaryMode, salaryInput, salaryDeps, salaryIns, salaryResult, salaryQuickValues,
      calcSalary, saveSalaryHistory, isActiveBracket, TAX_BRACKETS, fmtBracketRange,
      // Loan
      loanTotalValue, loanDownPayment, loanRate, loanYears, loanType, loanResult,
      loanPrincipal, loanDownPct, loanMonthlyPayment, loanPreviewSchedule,
      calcLoan, saveLoanHistory, fmtCur,
      // Tax
      taxPeriod, taxIncome, taxDeps, taxIns, taxOtherIncome, taxResult,
      taxActiveBrackets, doCalcTax, saveTaxHistory,
      // History
      histTab, histTabs, histories, currentHistory, hasAnyHistory,
      showClearConfirm, deleteHistItem, confirmClear, fmtDate,
    }
  },

  template: `
<div class="min-h-screen">
  <!-- Sidebar (desktop) -->
  <aside class="fixed top-0 left-0 h-full w-60 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 z-40 hidden lg:flex flex-col">
    <div class="p-5 border-b border-slate-100 dark:border-slate-800">
      <button @click="navigate('home')" class="flex items-center gap-3 w-full">
        <div class="w-9 h-9 bg-gradient-to-br from-brand-400 to-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/30 flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div class="text-left">
          <div class="font-bold text-slate-900 dark:text-white text-sm">VN Finance</div>
          <div class="text-xs text-slate-400">Tools</div>
        </div>
      </button>
    </div>
    <nav class="flex-1 p-3 space-y-0.5">
      <button
        v-for="item in navItems" :key="item.key"
        @click="navigate(item.key)"
        :class="['flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium transition-all w-full text-left', page === item.key ? 'bg-brand-50 dark:bg-brand-950/60 text-brand-700 dark:text-brand-300' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800']"
      >
        <span class="text-base">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
        <span v-if="page === item.key" class="ml-auto w-1.5 h-1.5 rounded-full bg-brand-500"></span>
      </button>
    </nav>
    <div class="p-3 border-t border-slate-100 dark:border-slate-800">
      <button @click="toggleDark()" class="flex items-center gap-3 px-3.5 py-2.5 w-full rounded-xl text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
        <span class="text-base">{{ isDark ? '☀️' : '🌙' }}</span>
        <span>{{ isDark ? 'Chế độ Sáng' : 'Chế độ Tối' }}</span>
      </button>
    </div>
  </aside>

  <!-- Mobile Header -->
  <header class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm border-b border-slate-200 dark:border-slate-800">
    <div class="flex items-center justify-between px-4 h-14">
      <button @click="navigate('home')" class="flex items-center gap-2">
        <div class="w-7 h-7 bg-gradient-to-br from-brand-400 to-brand-600 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <span class="font-bold text-sm dark:text-white">VN Finance</span>
      </button>
      <div class="flex gap-1">
        <button @click="toggleDark()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">{{ isDark ? '☀️' : '🌙' }}</button>
        <button @click="mobileMenuOpen = !mobileMenuOpen" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Menu -->
  <Transition name="slide">
    <div v-if="mobileMenuOpen" class="lg:hidden fixed inset-0 z-50" @click.self="mobileMenuOpen=false">
      <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="mobileMenuOpen=false"></div>
      <div class="absolute top-0 right-0 h-full w-56 bg-white dark:bg-slate-900 shadow-2xl">
        <div class="p-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
          <span class="font-bold dark:text-white">Menu</span>
          <button @click="mobileMenuOpen=false" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">✕</button>
        </div>
        <nav class="p-3 space-y-0.5">
          <button v-for="item in navItems" :key="item.key" @click="navigate(item.key)"
            :class="['flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium w-full text-left transition-all', page === item.key ? 'bg-brand-50 dark:bg-brand-950/60 text-brand-700 dark:text-brand-300' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800']">
            <span>{{ item.icon }}</span><span>{{ item.label }}</span>
          </button>
        </nav>
      </div>
    </div>
  </Transition>

  <!-- Main -->
  <main class="lg:ml-60 pt-14 lg:pt-0 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8">

      <!-- HOME -->
      <div v-if="page==='home'" class="animate-in">
        <div class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-brand-600 via-brand-700 to-slate-800 p-8 md:p-12 mb-8 text-white">
          <div class="absolute -top-16 -right-16 w-72 h-72 bg-brand-400/20 rounded-full blur-3xl pointer-events-none"></div>
          <div class="absolute -bottom-16 -left-16 w-60 h-60 bg-slate-700/30 rounded-full blur-3xl pointer-events-none"></div>
          <div class="relative z-10">
            <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 rounded-full px-4 py-1.5 text-xs font-medium mb-5">
              <span class="w-1.5 h-1.5 bg-green-400 rounded-full pulse-slow"></span>
              Theo luật thuế Việt Nam 2024
            </div>
            <h1 class="text-3xl md:text-4xl font-bold mb-3">
              Công Cụ Tài Chính<br>
              <span class="text-brand-300">Cá Nhân Việt Nam</span>
            </h1>
            <p class="text-brand-100/80 max-w-lg text-sm leading-relaxed mb-8">
              Tính toán lương Gross/Net, khoản vay mua nhà/xe, và thuế thu nhập cá nhân theo quy định mới nhất của pháp luật Việt Nam.
            </p>
            <div class="grid grid-cols-3 gap-3">
              <div v-for="s in [{v:'3',l:'Công cụ'},{v:'100%',l:'Miễn phí'},{v:'VN',l:'Luật Việt Nam'}]" :key="s.l"
                class="bg-white/10 backdrop-blur-sm rounded-xl p-3 text-center border border-white/10">
                <div class="text-xl font-bold font-mono">{{s.v}}</div>
                <div class="text-xs text-brand-200 mt-0.5">{{s.l}}</div>
              </div>
            </div>
          </div>
        </div>

        <h2 class="text-base font-bold text-slate-800 dark:text-slate-100 mb-4">Công cụ tài chính</h2>
        <div class="grid md:grid-cols-3 gap-4 mb-8">
          <button v-for="t in [
            {key:'salary',icon:'💵',bg:'bg-teal-50 dark:bg-teal-950/40',title:'Tính Lương Gross ↔ Net',desc:'Tính chuyển đổi lương có bảo hiểm, thuế TNCN lũy tiến và giảm trừ gia cảnh.',tags:['BHXH 8%','BHYT 1.5%','BHTN 1%']},
            {key:'loan',icon:'🏠',bg:'bg-purple-50 dark:bg-purple-950/40',title:'Tính Vay Mua Nhà / Xe',desc:'Tính khoản vay dư nợ giảm dần hoặc trả góp đều với lịch trả nợ chi tiết.',tags:['Dư nợ GD','Trả góp đều']},
            {key:'tax',icon:'📊',bg:'bg-orange-50 dark:bg-orange-950/40',title:'Tính Thuế TNCN',desc:'Tính thuế TNCN theo tháng hoặc năm với đầy đủ giảm trừ theo quy định.',tags:['Tháng / Năm','Lũy tiến']},
          ]" :key="t.key" @click="navigate(t.key)"
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 text-left hover:border-brand-300 dark:hover:border-brand-700 hover:shadow-md transition-all group cursor-pointer">
            <div :class="['w-11 h-11 rounded-2xl flex items-center justify-center text-xl mb-4', t.bg]">{{ t.icon }}</div>
            <h3 class="font-bold text-slate-900 dark:text-slate-100 mb-1.5 text-sm group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">{{ t.title }}</h3>
            <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mb-3">{{ t.desc }}</p>
            <div class="flex flex-wrap gap-1.5">
              <span v-for="tag in t.tags" :key="tag" class="text-xs px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded-full">{{ tag }}</span>
            </div>
          </button>
        </div>

        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6">
          <h2 class="font-bold text-slate-900 dark:text-slate-100 mb-4 text-sm">Thông tin áp dụng (2024)</h2>
          <div class="grid sm:grid-cols-2 gap-4">
            <div v-for="info in [
              {icon:'👤',l:'Giảm trừ bản thân',v:'15.5 triệu đồng/tháng'},
              {icon:'👨‍👩‍👧',l:'Giảm trừ người phụ thuộc',v:'6.2 triệu đồng/người/tháng'},
              {icon:'🏥',l:'Bảo hiểm NLĐ',v:'BHXH 8% + BHYT 1.5% + BHTN 1% = 10.5%'},
              {icon:'📈',l:'Biểu thuế lũy tiến',v:'5 bậc: 5% → 10% → 20% → 30% → 35%'},
            ]" :key="info.l" class="flex items-start gap-3">
              <div class="w-8 h-8 rounded-lg bg-brand-50 dark:bg-brand-950/50 flex items-center justify-center text-sm flex-shrink-0">{{ info.icon }}</div>
              <div>
                <div class="text-xs font-semibold text-slate-700 dark:text-slate-300">{{ info.l }}</div>
                <div class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">{{ info.v }}</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- SALARY -->
      <div v-else-if="page==='salary'" class="animate-in">
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-50">💰 Tính Lương Gross ↔ Net</h1>
          <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Tính toán lương theo hệ thống bảo hiểm và thuế TNCN Việt Nam</p>
        </div>
        <div class="grid lg:grid-cols-2 gap-6">
          <div class="space-y-4">
            <!-- Mode toggle -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-1.5">
              <div class="grid grid-cols-2 gap-1">
                <button @click="salaryMode='gross-to-net'" :class="['py-2.5 px-4 rounded-xl text-sm font-semibold transition-all', salaryMode==='gross-to-net' ? 'bg-brand-500 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400']">Gross → Net</button>
                <button @click="salaryMode='net-to-gross'" :class="['py-2.5 px-4 rounded-xl text-sm font-semibold transition-all', salaryMode==='net-to-gross' ? 'bg-brand-500 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400']">Net → Gross</button>
              </div>
            </div>
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 space-y-5">
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">{{ salaryMode==='gross-to-net' ? 'Lương Gross' : 'Lương Net' }} (triệu VND/tháng)</label>
                <input v-model.number="salaryInput" type="number" min="0" step="0.5" @keyup.enter="calcSalary"
                  class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 font-mono text-sm transition-all"
                  placeholder="Nhập lương..." />
                <div class="flex flex-wrap gap-1.5 mt-2">
                  <button v-for="v in salaryQuickValues" :key="v" @click="salaryInput=v; calcSalary()"
                    class="text-xs px-2.5 py-1 bg-slate-100 dark:bg-slate-800 hover:bg-brand-50 dark:hover:bg-brand-950/50 hover:text-brand-600 dark:hover:text-brand-400 text-slate-500 dark:text-slate-400 rounded-lg transition-colors font-mono">{{ v }}tr</button>
                </div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wide">Số người phụ thuộc</label>
                <div class="flex items-center gap-3">
                  <button @click="salaryDeps=Math.max(0,salaryDeps-1)" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 font-bold text-lg flex items-center justify-center transition-colors">−</button>
                  <div class="flex-1 text-center">
                    <div class="text-2xl font-bold font-mono">{{ salaryDeps }}</div>
                    <div class="text-xs text-slate-400">−{{ (salaryDeps*6.2).toFixed(1) }}tr/tháng</div>
                  </div>
                  <button @click="salaryDeps=Math.min(10,salaryDeps+1)" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 font-bold text-lg flex items-center justify-center transition-colors">+</button>
                </div>
              </div>
              <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 rounded-xl">
                <div>
                  <div class="text-sm font-medium text-slate-700 dark:text-slate-300">Đóng bảo hiểm</div>
                  <div class="text-xs text-slate-400">BHXH 8% + BHYT 1.5% + BHTN 1%</div>
                </div>
                <button @click="salaryIns=!salaryIns" :class="['relative inline-flex h-6 w-11 items-center rounded-full transition-colors', salaryIns ? 'bg-brand-500' : 'bg-slate-300 dark:bg-slate-600']">
                  <span :class="['inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform', salaryIns ? 'translate-x-6' : 'translate-x-1']"></span>
                </button>
              </div>
              <div class="flex gap-3">
                <button @click="calcSalary()" class="flex-1 py-3 px-6 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-xl transition-all shadow-sm">🔍 Tính toán</button>
                <button @click="salaryResult=null; salaryInput=20; salaryDeps=0" class="px-4 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 rounded-xl transition-all font-semibold">↺</button>
              </div>
            </div>

            <!-- Tax brackets -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
              <h3 class="text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide mb-3">📋 Biểu thuế lũy tiến</h3>
              <div class="space-y-1">
                <div v-for="b in TAX_BRACKETS" :key="b.label"
                  :class="['flex items-center justify-between text-xs py-1.5 px-3 rounded-lg transition-colors', isActiveBracket(b) ? 'bg-brand-50 dark:bg-brand-950/60 text-brand-700 dark:text-brand-300 font-semibold border border-brand-200 dark:border-brand-800' : 'text-slate-500 dark:text-slate-400']">
                  <span>{{ b.label }}</span>
                  <span class="font-mono">{{ fmtBracketRange(b) }}</span>
                  <span :class="isActiveBracket(b) ? 'font-bold text-brand-600 dark:text-brand-400' : ''">{{ (b.rate*100).toFixed(0) }}%</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Results -->
          <div class="space-y-4">
            <Transition name="fade" mode="out-in">
              <div v-if="salaryResult" class="space-y-4">
                <div class="bg-gradient-to-br from-brand-50 to-teal-50/50 dark:from-brand-950/30 dark:to-slate-900 border border-brand-200 dark:border-brand-900 rounded-2xl p-6">
                  <div class="grid grid-cols-2 gap-4 mb-3">
                    <div>
                      <div class="text-xs font-semibold text-brand-600 dark:text-brand-400 uppercase tracking-wide mb-1">Lương Gross</div>
                      <div class="text-2xl font-bold font-mono">{{ salaryResult.gross.toFixed(2) }}<span class="text-sm font-normal text-slate-400 ml-1">tr</span></div>
                    </div>
                    <div>
                      <div class="text-xs font-semibold text-brand-600 dark:text-brand-400 uppercase tracking-wide mb-1">Lương Net</div>
                      <div class="text-2xl font-bold font-mono text-brand-600 dark:text-brand-400">{{ salaryResult.net.toFixed(2) }}<span class="text-sm font-normal text-brand-400 ml-1">tr</span></div>
                    </div>
                  </div>
                  <div class="text-xs text-slate-500 dark:text-slate-400 border-t border-brand-200/50 dark:border-brand-800/50 pt-2">
                    Tỷ lệ Net/Gross: <span class="font-mono font-semibold text-slate-700 dark:text-slate-300">{{ ((salaryResult.net/salaryResult.gross)*100).toFixed(1) }}%</span>
                  </div>
                </div>

                <!-- Breakdown -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
                  <h3 class="text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide mb-4">Chi tiết khấu trừ</h3>
                  <div class="space-y-2">
                    <div v-for="row in [
                      {label:'BHXH (8%)', amt: salaryResult.bhxh, color:'bg-orange-400'},
                      {label:'BHYT (1.5%)', amt: salaryResult.bhyt, color:'bg-yellow-400'},
                      {label:'BHTN (1%)', amt: salaryResult.bhtn, color:'bg-pink-400'},
                    ]" :key="row.label" class="flex items-center gap-3 py-1">
                      <div :class="['w-2.5 h-2.5 rounded-full flex-shrink-0', row.color]"></div>
                      <div class="flex-1 text-xs text-slate-600 dark:text-slate-400">{{ row.label }}</div>
                      <div class="hidden sm:block w-20">
                        <div class="h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                          <div :class="['h-full rounded-full', row.color]" :style="{width: Math.min(100,(row.amt/salaryResult.gross)*100)+'%'}"></div>
                        </div>
                      </div>
                      <div class="font-mono text-xs font-semibold text-red-500 dark:text-red-400 w-20 text-right">−{{ row.amt.toFixed(3) }}tr</div>
                    </div>
                    <div class="text-xs text-slate-400 px-1 py-1">
                      Giảm trừ: 15.5tr + {{ salaryResult.dependentDeductionTotal.toFixed(1) }}tr → Tính thuế: <span class="font-mono font-semibold text-slate-600 dark:text-slate-300">{{ salaryResult.taxableIncome.toFixed(2) }}tr</span>
                    </div>
                    <div class="flex items-center gap-3 py-1">
                      <div class="w-2.5 h-2.5 rounded-full bg-red-500 flex-shrink-0"></div>
                      <div class="flex-1 text-xs text-slate-600 dark:text-slate-400">Thuế TNCN</div>
                      <div class="font-mono text-xs font-semibold text-red-500 dark:text-red-400 w-20 text-right">−{{ salaryResult.tax.toFixed(3) }}tr</div>
                    </div>
                    <div class="border-t border-slate-200 dark:border-slate-700 pt-2">
                      <div class="flex items-center gap-3 py-1">
                        <div class="w-2.5 h-2.5 rounded-full bg-brand-500 flex-shrink-0"></div>
                        <div class="flex-1 text-xs font-bold text-slate-800 dark:text-slate-200">✅ Lương Net</div>
                        <div class="font-mono text-sm font-bold text-brand-600 dark:text-brand-400 w-20 text-right">{{ salaryResult.net.toFixed(3) }}tr</div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Pie Chart -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
                  <h3 class="text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide mb-4">Phân bổ lương</h3>
                  <canvas id="salaryPieChart"></canvas>
                </div>

                <div class="flex gap-3">
                  <button @click="saveSalaryHistory()" class="flex-1 px-4 py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold rounded-xl text-sm transition-all">💾 Lưu lịch sử</button>
                </div>
              </div>
              <div v-else class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-14 text-center">
                <div class="text-4xl mb-3">💰</div>
                <div class="text-slate-500 dark:text-slate-400 text-sm">Nhập lương và nhấn "Tính toán"</div>
              </div>
            </Transition>
          </div>
        </div>
      </div>

      <!-- LOAN -->
      <div v-else-if="page==='loan'" class="animate-in">
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-50">🏠 Tính Vay Mua Nhà / Xe</h1>
          <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Tính khoản vay theo phương pháp dư nợ giảm dần hoặc trả góp đều</p>
        </div>
        <div class="grid lg:grid-cols-2 gap-6">
          <div class="space-y-4">
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-1.5">
              <div class="grid grid-cols-2 gap-1">
                <button @click="loanType='annuity'" :class="['py-2.5 px-4 rounded-xl text-xs font-semibold transition-all text-center', loanType==='annuity' ? 'bg-purple-500 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400']">📅 Trả Góp Đều</button>
                <button @click="loanType='decreasing'" :class="['py-2.5 px-4 rounded-xl text-xs font-semibold transition-all text-center', loanType==='decreasing' ? 'bg-purple-500 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400']">📉 Dư Nợ Giảm Dần</button>
              </div>
            </div>
            <div class="px-4 py-3 bg-purple-50 dark:bg-purple-950/30 border border-purple-100 dark:border-purple-900/50 rounded-xl text-xs text-purple-700 dark:text-purple-300">
              <template v-if="loanType==='annuity'"><strong>Trả góp đều:</strong> Mỗi tháng trả cùng một số tiền cố định, tỷ lệ gốc tăng dần, lãi giảm dần.</template>
              <template v-else><strong>Dư nợ giảm dần:</strong> Tiền gốc cố định, tiền lãi giảm dần. Tổng tiền tháng đầu cao nhất.</template>
            </div>
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 space-y-4">
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">Giá trị tài sản (triệu VND)</label>
                <input v-model.number="loanTotalValue" type="number" min="0" step="100" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500/50 font-mono text-sm" placeholder="3000" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">Trả trước (triệu VND)</label>
                <input v-model.number="loanDownPayment" type="number" min="0" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500/50 font-mono text-sm" />
                <div class="text-xs text-slate-400 mt-1 font-mono">Vay: {{ loanPrincipal.toFixed(0) }}tr ({{ (100-loanDownPct) }}%)</div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">Lãi suất (%/năm)</label>
                <input v-model.number="loanRate" type="number" min="0" max="30" step="0.1" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500/50 font-mono text-sm" />
                <div class="flex flex-wrap gap-1.5 mt-2">
                  <button v-for="r in [6.5,7.5,8,9,10,11,12]" :key="r" @click="loanRate=r"
                    :class="['text-xs px-2 py-0.5 rounded-lg font-mono transition-colors', loanRate===r ? 'bg-purple-500 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-purple-50 dark:hover:bg-purple-950/50']">{{ r }}%</button>
                </div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">Số năm vay</label>
                <input v-model.number="loanYears" type="number" min="1" max="30" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500/50 font-mono text-sm" />
                <div class="flex flex-wrap gap-1.5 mt-2">
                  <button v-for="y in [5,10,15,20,25,30]" :key="y" @click="loanYears=y"
                    :class="['text-xs px-2 py-0.5 rounded-lg font-mono transition-colors', loanYears===y ? 'bg-purple-500 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-purple-50 dark:hover:bg-purple-950/50']">{{ y }}y</button>
                </div>
              </div>
              <div class="flex gap-3 pt-1">
                <button @click="calcLoan()" class="flex-1 py-3 px-6 bg-purple-500 hover:bg-purple-600 text-white font-semibold rounded-xl transition-all shadow-sm">🔍 Tính toán</button>
                <button @click="loanResult=null" class="px-4 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 rounded-xl transition-all font-semibold">↺</button>
              </div>
            </div>
          </div>

          <!-- Loan Results -->
          <div class="space-y-4">
            <Transition name="fade" mode="out-in">
              <div v-if="loanResult" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                  <div class="bg-white dark:bg-slate-900 border border-purple-100 dark:border-purple-900/50 rounded-2xl p-4">
                    <div class="text-xs font-semibold text-purple-600 dark:text-purple-400 uppercase tracking-wide mb-1">Trả hàng tháng</div>
                    <div class="text-xl font-bold font-mono text-purple-700 dark:text-purple-300">{{ fmtCur(loanMonthlyPayment) }}</div>
                    <div v-if="loanType==='decreasing'" class="text-xs text-slate-400 font-mono mt-0.5">→ {{ fmtCur(loanResult.monthlyPaymentLast) }}</div>
                  </div>
                  <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4">
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Tổng lãi</div>
                    <div class="text-xl font-bold font-mono text-red-500">{{ fmtCur(loanResult.totalInterest) }}</div>
                    <div class="text-xs text-slate-400 font-mono">{{ ((loanResult.totalInterest/loanResult.principal)*100).toFixed(1) }}% vốn</div>
                  </div>
                  <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 col-span-2">
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Tổng tiền phải trả</div>
                    <div class="text-xl font-bold font-mono">{{ fmtCur(loanResult.totalPayment) }}</div>
                    <div class="text-xs text-slate-400 mt-1">Gốc: <span class="font-mono">{{ fmtCur(loanResult.principal) }}</span> + Lãi: <span class="font-mono text-red-400">{{ fmtCur(loanResult.totalInterest) }}</span></div>
                  </div>
                </div>

                <!-- Chart -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
                  <h3 class="text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide mb-4">Biểu đồ dư nợ & thanh toán</h3>
                  <canvas id="loanLineChart"></canvas>
                </div>

                <!-- Schedule Preview -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
                  <h3 class="text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide mb-3 flex justify-between">
                    Lịch trả nợ <span class="font-normal text-slate-400">{{ loanResult.schedule.length }} tháng</span>
                  </h3>
                  <div class="overflow-auto max-h-52">
                    <table class="w-full text-xs">
                      <thead class="sticky top-0 bg-white dark:bg-slate-900">
                        <tr class="text-slate-400 uppercase">
                          <th class="pb-2 text-left font-medium">T</th>
                          <th class="pb-2 text-right font-medium">Trả</th>
                          <th class="pb-2 text-right font-medium text-purple-500">Gốc</th>
                          <th class="pb-2 text-right font-medium text-red-500">Lãi</th>
                          <th class="pb-2 text-right font-medium">Dư nợ</th>
                        </tr>
                      </thead>
                      <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                        <tr v-for="row in loanPreviewSchedule" :key="row.month" class="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                          <td class="py-1.5 font-mono">{{ row.month === '...' ? '···' : 'T'+row.month }}</td>
                          <td class="py-1.5 text-right font-mono font-medium">{{ row.payment !== null ? fmtCur(row.payment) : '···' }}</td>
                          <td class="py-1.5 text-right font-mono text-purple-600 dark:text-purple-400">{{ row.principal !== null ? fmtCur(row.principal) : '···' }}</td>
                          <td class="py-1.5 text-right font-mono text-red-500">{{ row.interest !== null ? fmtCur(row.interest) : '···' }}</td>
                          <td class="py-1.5 text-right font-mono text-slate-500">{{ row.balance !== null ? fmtCur(row.balance) : '···' }}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                <button @click="saveLoanHistory()" class="w-full px-4 py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold rounded-xl text-sm transition-all">💾 Lưu lịch sử</button>
              </div>
              <div v-else class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-14 text-center">
                <div class="text-4xl mb-3">🏦</div>
                <div class="text-slate-500 dark:text-slate-400 text-sm">Nhập thông tin vay và nhấn "Tính toán"</div>
              </div>
            </Transition>
          </div>
        </div>
      </div>

      <!-- TAX -->
      <div v-else-if="page==='tax'" class="animate-in">
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-50">📊 Tính Thuế TNCN</h1>
          <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Thuế thu nhập cá nhân theo Luật thuế TNCN Việt Nam</p>
        </div>
        <div class="grid lg:grid-cols-2 gap-6">
          <div class="space-y-4">
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-1.5">
              <div class="grid grid-cols-2 gap-1">
                <button @click="taxPeriod='monthly'" :class="['py-2.5 px-4 rounded-xl text-sm font-semibold transition-all', taxPeriod==='monthly' ? 'bg-orange-500 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400']">📅 Theo tháng</button>
                <button @click="taxPeriod='annual'" :class="['py-2.5 px-4 rounded-xl text-sm font-semibold transition-all', taxPeriod==='annual' ? 'bg-orange-500 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400']">📆 Theo năm</button>
              </div>
            </div>
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 space-y-4">
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">{{ taxPeriod==='monthly' ? 'Thu nhập tháng' : 'Thu nhập năm' }} (triệu VND)</label>
                <input v-model.number="taxIncome" type="number" min="0" step="0.5" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-orange-500/50 font-mono text-sm" :placeholder="taxPeriod==='monthly' ? '25' : '300'" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">Thu nhập khác (triệu/tháng)</label>
                <input v-model.number="taxOtherIncome" type="number" min="0" step="0.5" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-orange-500/50 font-mono text-sm" placeholder="0" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wide">Số người phụ thuộc</label>
                <div class="flex items-center gap-3">
                  <button @click="taxDeps=Math.max(0,taxDeps-1)" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-orange-100 dark:hover:bg-orange-900/30 font-bold text-lg flex items-center justify-center transition-colors">−</button>
                  <div class="flex-1 text-center"><div class="text-2xl font-bold font-mono">{{ taxDeps }}</div><div class="text-xs text-slate-400">−{{ (taxDeps*6.2).toFixed(1) }}tr/tháng</div></div>
                  <button @click="taxDeps=Math.min(10,taxDeps+1)" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-orange-100 dark:hover:bg-orange-900/30 font-bold text-lg flex items-center justify-center transition-colors">+</button>
                </div>
              </div>
              <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 rounded-xl">
                <div>
                  <div class="text-sm font-medium text-slate-700 dark:text-slate-300">Đóng bảo hiểm</div>
                  <div class="text-xs text-slate-400">Được trừ trước khi tính thuế</div>
                </div>
                <button @click="taxIns=!taxIns" :class="['relative inline-flex h-6 w-11 items-center rounded-full transition-colors', taxIns ? 'bg-orange-500' : 'bg-slate-300 dark:bg-slate-600']">
                  <span :class="['inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform', taxIns ? 'translate-x-6' : 'translate-x-1']"></span>
                </button>
              </div>
              <div class="flex gap-3 pt-1">
                <button @click="doCalcTax()" class="flex-1 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl transition-all shadow-sm">🔍 Tính thuế</button>
                <button @click="taxResult=null; taxIncome=25; taxDeps=0" class="px-4 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 rounded-xl transition-all font-semibold">↺</button>
              </div>
            </div>

            <!-- Bracket Table -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
              <h3 class="text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide mb-3">Biểu thuế lũy tiến</h3>
              <table class="w-full text-xs">
                <thead class="bg-slate-50 dark:bg-slate-800 rounded-xl">
                  <tr class="text-slate-400 uppercase"><th class="px-2 py-2 text-left">Bậc</th><th class="px-2 py-2 text-left">Thu nhập</th><th class="px-2 py-2 text-right">%</th><th class="px-2 py-2 text-right">Nộp</th></tr>
                </thead>
                <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                  <tr v-for="b in taxActiveBrackets" :key="b.label"
                    :class="['transition-colors', b.highlighted ? 'bg-orange-50 dark:bg-orange-950/30 text-orange-700 dark:text-orange-300 font-semibold' : 'text-slate-600 dark:text-slate-400']">
                    <td class="px-2 py-1.5">{{ b.label }}</td>
                    <td class="px-2 py-1.5 font-mono">{{ fmtBracketRange(b) }}</td>
                    <td class="px-2 py-1.5 text-right font-mono">{{ (b.rate*100).toFixed(0) }}%</td>
                    <td class="px-2 py-1.5 text-right font-mono">{{ b.taxAmount > 0 ? b.taxAmount.toFixed(2)+'tr' : '—' }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Tax Results -->
          <div class="space-y-4">
            <Transition name="fade" mode="out-in">
              <div v-if="taxResult" class="space-y-4">
                <div class="bg-gradient-to-br from-orange-50 to-amber-50/50 dark:from-orange-950/30 dark:to-slate-900 border border-orange-200 dark:border-orange-900/50 rounded-2xl p-6">
                  <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-semibold text-orange-600 dark:text-orange-400 uppercase tracking-wide">Thuế phải nộp {{ taxPeriod==='monthly' ? '/tháng' : '/năm' }}</span>
                    <span class="text-xs px-2.5 py-1 bg-orange-100 dark:bg-orange-900/50 text-orange-700 dark:text-orange-300 rounded-full font-medium">≈ {{ taxResult.effectiveTaxRate.toFixed(1) }}% thu nhập</span>
                  </div>
                  <div class="text-4xl font-bold font-mono text-orange-600 dark:text-orange-400">{{ taxResult.tax.toFixed(3) }}<span class="text-lg font-normal text-orange-400 ml-1">triệu</span></div>
                  <div class="text-xs text-slate-500 dark:text-slate-400 mt-1 font-mono">≈ {{ new Intl.NumberFormat('vi-VN').format(Math.round(taxResult.tax*1e6)) }} đồng</div>
                </div>

                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
                  <h3 class="text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide mb-4">Chi tiết tính thuế</h3>
                  <div class="space-y-1.5 text-xs">
                    <div class="flex justify-between py-1 font-semibold text-slate-700 dark:text-slate-300"><span>Tổng thu nhập</span><span class="font-mono">{{ taxResult.totalGrossIncome.toFixed(3) }}tr</span></div>
                    <div class="flex justify-between py-1 text-red-500 dark:text-red-400"><span>− Bảo hiểm ({{ taxResult.totalInsurance.toFixed(3) }}tr)</span><span class="font-mono">−{{ taxResult.totalInsurance.toFixed(3) }}tr</span></div>
                    <div class="flex justify-between py-1 text-slate-500 border-t border-slate-100 dark:border-slate-800 pt-2 font-medium"><span>= Thu nhập chịu thuế</span><span class="font-mono">{{ taxResult.taxableSubjectIncome.toFixed(3) }}tr</span></div>
                    <div class="flex justify-between py-1 text-red-500 dark:text-red-400"><span>− Giảm trừ bản thân</span><span class="font-mono">−{{ taxResult.personalDeduction.toFixed(1) }}tr</span></div>
                    <div class="flex justify-between py-1 text-red-500 dark:text-red-400"><span>− Giảm trừ phụ thuộc ({{ taxDeps }}×6.2)</span><span class="font-mono">−{{ taxResult.dependentDeductionTotal.toFixed(1) }}tr</span></div>
                    <div class="flex justify-between py-1 border-t border-slate-200 dark:border-slate-700 pt-2 font-semibold text-slate-700 dark:text-slate-300"><span>= Thu nhập tính thuế</span><span class="font-mono">{{ taxResult.taxCalculationIncome.toFixed(3) }}tr</span></div>
                    <div class="flex justify-between py-2 font-bold text-orange-600 dark:text-orange-400 border-t border-slate-200 dark:border-slate-700"><span>Thuế TNCN phải nộp</span><span class="font-mono text-base">{{ taxResult.tax.toFixed(3) }}tr</span></div>
                    <div class="flex justify-between py-2 font-bold text-brand-600 dark:text-brand-400 border-t-2 border-slate-200 dark:border-slate-700"><span>✅ Thu nhập thực nhận</span><span class="font-mono text-base">{{ taxResult.netIncome.toFixed(3) }}tr</span></div>
                  </div>
                </div>

                <button @click="saveTaxHistory()" class="w-full px-4 py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold rounded-xl text-sm transition-all">💾 Lưu lịch sử</button>
              </div>
              <div v-else class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-14 text-center">
                <div class="text-4xl mb-3">📊</div>
                <div class="text-slate-500 dark:text-slate-400 text-sm">Nhập thu nhập và nhấn "Tính thuế"</div>
              </div>
            </Transition>
          </div>
        </div>
      </div>

      <!-- HISTORY -->
      <div v-else-if="page==='history'" class="animate-in">
        <div class="mb-6 flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-50">📋 Lịch Sử Tính Toán</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Lưu trữ tất cả các lần tính toán gần đây</p>
          </div>
          <button v-if="hasAnyHistory" @click="showClearConfirm=true" class="px-3 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-950/30 rounded-xl text-sm font-medium transition-colors">🗑️ Xóa hết</button>
        </div>
        <div class="flex gap-2 mb-5">
          <button v-for="t in histTabs" :key="t.key" @click="histTab=t.key"
            :class="['px-4 py-2 rounded-xl text-sm font-medium transition-all', histTab===t.key ? 'bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700']">
            {{ t.icon }} {{ t.label }}
            <span v-if="histories[t.key].length" class="ml-1.5 text-xs bg-brand-500 text-white rounded-full px-1.5 py-0.5">{{ histories[t.key].length }}</span>
          </button>
        </div>
        <div v-if="currentHistory.length" class="space-y-2.5">
          <div v-for="item in currentHistory" :key="item.id"
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 hover:border-brand-300 dark:hover:border-brand-700 transition-all">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <div class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-1.5 truncate">{{ item.label }}</div>
                <div class="flex flex-wrap gap-2 text-xs text-slate-400">
                  <span class="font-mono">{{ fmtDate(item.timestamp) }}</span>
                  <template v-if="histTab==='salary'">
                    <span class="px-2 py-0.5 bg-teal-100 dark:bg-teal-900/50 text-teal-700 dark:text-teal-300 rounded-full">{{ item.mode==='gross-to-net' ? 'G→N' : 'N→G' }}</span>
                    <span>{{ item.dependents }} phụ thuộc</span>
                  </template>
                  <template v-if="histTab==='loan'">
                    <span class="px-2 py-0.5 bg-purple-100 dark:bg-purple-900/50 text-purple-700 dark:text-purple-300 rounded-full">{{ item.loanType }}</span>
                    <span class="font-mono">{{ item.annualRate }}%/năm • {{ item.termYears }}y</span>
                  </template>
                  <template v-if="histTab==='tax'">
                    <span class="px-2 py-0.5 bg-orange-100 dark:bg-orange-900/50 text-orange-700 dark:text-orange-300 rounded-full">{{ item.period==='monthly' ? 'Tháng' : 'Năm' }}</span>
                    <span class="font-mono">{{ item.effectiveTaxRate?.toFixed(1) }}% thuế</span>
                  </template>
                </div>
              </div>
              <button @click="deleteHistItem(item.id)" class="text-slate-300 dark:text-slate-600 hover:text-red-500 dark:hover:text-red-400 transition-colors p-1 flex-shrink-0">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div v-else class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-16 text-center">
          <div class="text-5xl mb-4">📭</div>
          <div class="text-slate-500 dark:text-slate-400 text-sm">Chưa có lịch sử. Hãy thực hiện tính toán và lưu lại!</div>
        </div>

        <!-- Clear Confirm -->
        <Transition name="slide">
          <div v-if="showClearConfirm" class="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="showClearConfirm=false"></div>
            <div class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 max-w-sm w-full shadow-2xl">
              <h3 class="font-bold text-slate-900 dark:text-slate-100 mb-2">Xóa tất cả lịch sử?</h3>
              <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Hành động này không thể hoàn tác.</p>
              <div class="flex gap-3">
                <button @click="showClearConfirm=false" class="flex-1 py-2.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-semibold rounded-xl">Hủy</button>
                <button @click="confirmClear()" class="flex-1 py-2.5 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-xl transition-colors">Xóa</button>
              </div>
            </div>
          </div>
        </Transition>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <Transition name="toast">
    <div v-if="toastMsg" class="fixed bottom-6 right-6 z-50 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium">{{ toastMsg }}</div>
  </Transition>
</div>
  `
}

createApp(App).mount('#app')
</script>
